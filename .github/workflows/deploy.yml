name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted # WSL2 runner 사용

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Migrate DB
        run: npx prisma migrate deploy

      - name: Restart app
        run: pm2 restart quickdrop
