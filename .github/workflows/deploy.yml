name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load env file
        run: cp ~/.env.quickdrop .env.production

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Migrate DB
        run: |
          set -a && . ~/.env.quickdrop && set +a
          npx prisma migrate deploy

      - name: Restart app
        run: pm2 restart quickdrop || pm2 start npm --name quickdrop -- start
